<header class="site-header">
    <div class="header-container">
        <a href="{{ "/" | relLangURL }}" class="site-logo">
            <img src="{{ "logo.svg" | relURL }}" alt="1969 — The Art of loving" height="50">
        </a>

        <button class="menu-toggle" aria-label="Menu" aria-expanded="false">
            <span class="hamburger"></span>
        </button>

        <nav class="site-nav" role="navigation">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL | relLangURL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">
                {{ .Name }}
            </a>
            {{ end }}

            <span class="lang-switch">
                {{ if eq $.Site.Language.Lang "fr" }}
                    <a href="{{ replace $.RelPermalink "/" "/en/" 1 }}" title="English">EN</a>
                {{ else }}
                    <a href="{{ replace $.RelPermalink "/en/" "/" 1 }}" title="Français">FR</a>
                {{ end }}
            </span>
        </nav>
    </div>
</header>

<script>
document.querySelector('.menu-toggle').addEventListener('click', function() {
    const nav = document.querySelector('.site-nav');
    const expanded = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', !expanded);
    nav.classList.toggle('nav-open');
});
</script>
