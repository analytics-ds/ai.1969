<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Art du Désir — par 1969</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fffcfa;
            color: #1e1c1c;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem 2rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            font-size: 1.1rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #1e1c1c;
        }

        .logo strong {
            font-weight: 600;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }

        .hero {
            text-align: center;
            max-width: 640px;
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            font-size: clamp(2.5rem, 6vw, 4rem);
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            color: #232323;
        }

        .hero h1 span {
            color: #cc5500;
            font-weight: 500;
        }

        .hero p {
            font-size: 1.125rem;
            line-height: 1.7;
            color: #555;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .badge {
            display: inline-block;
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #cc5500;
            border: 1px solid #cc5500;
            padding: 0.5rem 1.5rem;
            border-radius: 0;
        }

        footer {
            padding: 2rem;
            border-top: 1px solid #e0e0e0;
            text-align: center;
        }

        footer p {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #999;
        }

        footer a {
            color: #cc5500;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><strong>1969</strong> — L'Art du Désir</div>
    </header>

    <main>
        <div class="hero">
            <h1>L'Art du <span>Désir</span></h1>
            <p>Le guide BDSM et vie de couple par 1969.<br>Le site arrive bientôt.</p>
            <span class="badge">Coming soon</span>
        </div>
    </main>

    <footer>
        <p><a href="https://1969.fr" target="_blank">1969.fr</a></p>
    </footer>
</body>
</html>
